<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XRP Whale Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f13;
      --surface: #111820;
      --border: #1e2a35;
      --text: #c9d4de;
      --muted: #4a5f72;
      --bright: #e8f1f8;
      --blue: #3b9eff;
      --green: #3ecf8e;
      --red: #f16464;
      --yellow: #e8b84b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      min-height: 100vh;
      padding: 32px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      color: var(--bright);
      letter-spacing: 0.02em;
    }

    .logo span { color: var(--blue); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.on {
      background: var(--green);
      box-shadow: 0 0 4px var(--green);
    }

    /* price row */
    .price-row {
      display: flex;
      align-items: flex-end;
      gap: 32px;
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .price-block {}
    .price-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
    .price-value { font-size: 28px; font-weight: 300; color: var(--bright); letter-spacing: -0.5px; }

    .spark-block { flex: 1; min-width: 160px; max-width: 320px; }
    canvas { display: block; width: 100%; height: 48px; }

    
    .table-header {
      display: grid;
      grid-template-columns: 80px 1fr 1fr 120px 80px;
      gap: 8px;
      padding: 0 0 8px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .col-right { text-align: right; }

    .event {
      display: grid;
      grid-template-columns: 80px 1fr 1fr 120px 80px;
      gap: 8px;
      padding: 12px 0;
      border-bottom: 1px solid #0e1620;
      align-items: center;
      opacity: 0;
      animation: fadein 0.25s ease forwards;
      transition: background 0.4s;
    }

    .event.flash { background: #0d1e14; border-radius: 4px; padding: 12px 8px; margin: 0 -8px; }

    @keyframes fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .col-time { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }

    .addr {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .addr.known { color: var(--yellow); }

    .col-amt { text-align: right; }
    .xrp { font-weight: 500; color: var(--bright); font-variant-numeric: tabular-nums; }
    .usd { font-size: 11px; color: var(--muted); margin-top: 1px; font-variant-numeric: tabular-nums; }

    .col-link { text-align: right; }
    .tx-link {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .tx-link:hover { color: var(--blue); }

    .empty { color: var(--muted); padding: 32px 0; font-size: 12px; }

    @media (max-width: 600px) {
      .table-header { grid-template-columns: 60px 1fr 100px; }
      .table-header .col-from, .table-header .col-link { display: none; }
      .event { grid-template-columns: 60px 1fr 100px; }
      .event .addr:first-of-type, .event .col-link { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">XRP <span>Whale</span> Feed</div>
  <div class="live-badge">
    <span class="dot" id="dot"></span>
    <span id="status">connecting</span>
  </div>
</nav>

<div class="price-row">
  <div class="price-block">
    <div class="price-label">XRP / USD</div>
    <div class="price-value" id="price">—</div>
  </div>
  <div class="spark-block">
    <canvas id="spark" width="320" height="48"></canvas>
  </div>
</div>

<div class="table-header">
  <span>Time</span>
  <span class="col-from">From</span>
  <span>To</span>
  <span class="col-right">Amount</span>
  <span class="col-right">Tx</span>
</div>

<div id="feed">
  <div class="empty">monitoring for transfers ≥ 1,000,000 XRP…</div>
</div>

<script>
const API = "https://xrp-sleeping-whales-tracker-production.up.railway.app";

const KNOWN_LABELS = new Set([
  "Ripple Escrow","Ripple Genesis","Bithumb","Binance",
  "Upbit","Coinbase","Kraken","Uphold"
]);

let priceHistory = [];

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

function drawSpark(history) {
  const canvas = document.getElementById("spark");
  const ctx = canvas.getContext("2d");
  const W = canvas.offsetWidth || 320;
  const H = 48;
  canvas.width = W;
  ctx.clearRect(0, 0, W, H);
  if (history.length < 2) return;

  const prices = history.map(h => h.p);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 0.001;
  const color = prices[prices.length-1] >= prices[0] ? "#3ecf8e" : "#f16464";

  ctx.beginPath();
  history.forEach((h, i) => {
    const x = (i / (history.length - 1)) * W;
    const y = H - 4 - ((h.p - min) / range) * (H - 8);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function setStatus(on) {
  document.getElementById("dot").className = "dot" + (on ? " on" : "");
  document.getElementById("status").textContent = on ? "live" : "reconnecting";
}

function setPrice(p) {
  document.getElementById("price").textContent = p ? `$${p.toFixed(4)}` : "—";
}

function makeRow(e, flash) {
  const div = document.createElement("div");
  div.className = "event" + (flash ? " flash" : "");
  div.dataset.id = e.id;
  div.dataset.ts = e.ts;
  div.innerHTML = `
    <span class="col-time">${timeAgo(e.ts)}</span>
    <span class="addr ${KNOWN_LABELS.has(e.fromLabel) ? "known" : ""}">${e.fromLabel}</span>
    <span class="addr ${KNOWN_LABELS.has(e.toLabel) ? "known" : ""}">${e.toLabel}</span>
    <div class="col-amt">
      <div class="xrp">${e.xrp.toLocaleString()} XRP</div>
      ${e.usd ? `<div class="usd">$${e.usd}</div>` : ""}
    </div>
    <div class="col-link">
      <a class="tx-link" href="https://xrpscan.com/tx/${e.hash}" target="_blank">view ↗</a>
    </div>
  `;
  return div;
}

function renderFeed(events) {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  if (!events.length) {
    feed.innerHTML = '<div class="empty">monitoring for transfers ≥ 1,000,000 XRP…</div>';
    return;
  }
  events.forEach(e => feed.appendChild(makeRow(e, false)));
}

function prependEvent(e) {
  const feed = document.getElementById("feed");
  feed.querySelector(".empty")?.remove();
  if (feed.querySelector(`[data-id="${e.id}"]`)) return;
  const row = makeRow(e, true);
  feed.insertBefore(row, feed.firstChild);
  setTimeout(() => row.classList.remove("flash"), 2000);
  const rows = feed.querySelectorAll(".event");
  if (rows.length > 50) rows[rows.length - 1].remove();
}

setInterval(() => {
  document.querySelectorAll(".event[data-ts]").forEach(row => {
    row.querySelector(".col-time").textContent = timeAgo(parseInt(row.dataset.ts));
  });
}, 30000);

const es = new EventSource(`${API}/api/stream`);
es.onmessage = e => {
  const msg = JSON.parse(e.data);
  if (msg.type === "init") {
    setStatus(msg.connected);
    setPrice(msg.price);
    priceHistory = msg.priceHistory || [];
    drawSpark(priceHistory);
    renderFeed(msg.events);
  }
  if (msg.type === "event") prependEvent(msg.event);
  if (msg.type === "price") {
    setPrice(msg.price);
    priceHistory = msg.history || [];
    drawSpark(priceHistory);
  }
  if (msg.type === "status") setStatus(msg.connected);
};
es.onerror = () => setStatus(false);
</script>
</body>
</html>
